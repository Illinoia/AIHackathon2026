<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JobFlow AI — Q&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --ink:#0d1220; --muted:#6b7280; --line:#e8ebf2;
  --indigo:#4f46e5; --indigo2:#6366f1; --indigo-soft:#eef0fe; --green:#10b981;
  --green-soft:#d1fae5; --dark:#0c1222;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:300px 1fr;height:100vh}
/* Sidebar */
.side{background:#fbfcfe;border-right:1px solid var(--line);padding:24px 18px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
.brand{font-weight:800;font-size:22px;line-height:1.15;letter-spacing:-.02em}
.status{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:500;margin-top:3px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
.section-label{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.actions{display:flex;flex-direction:column;gap:8px}
.qa{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 13px;font:inherit;font-weight:600;font-size:14px;color:var(--ink);cursor:pointer;transition:.15s}
.qa:hover{background:var(--indigo-soft);border-color:var(--indigo2);color:var(--indigo)}
.qa .ico{font-size:17px;line-height:1;flex-shrink:0}
.qa.primary{background:var(--dark);color:#fff;border-color:var(--dark)}
.qa.primary:hover{background:#1c2438;color:#fff}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px}
.drop{border:2px dashed #cdd3e4;border-radius:14px;padding:18px;text-align:center;background:#fcfdff;cursor:pointer;transition:.15s}
.drop.drag{border-color:var(--indigo);background:var(--indigo-soft)}
.drop .cloud{font-size:26px}
.drop h4{font-size:14.5px;font-weight:700;margin-top:6px}
.drop p{color:var(--muted);font-size:12.5px;margin-top:4px;line-height:1.4}
.drop .btnrow{display:flex;gap:8px;justify-content:center;margin-top:12px}
.btn{border:0;border-radius:10px;padding:9px 14px;font:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.btn-dark{background:var(--dark);color:#fff}.btn-dark:hover{background:#1c2438}
.btn-soft{background:#eceef4;color:var(--ink)}.btn-soft:hover{background:#e1e4ee}
.status-line{font-size:12px;color:var(--muted);margin-top:8px;min-height:15px}
.files{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.filechip{display:flex;align-items:center;gap:8px;background:var(--indigo-soft);color:var(--indigo);border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;text-decoration:none}
.filechip:hover{background:#e3e7fd}
.filechip{min-width:0;overflow-wrap:anywhere}
.files-empty{font-size:12.5px;color:var(--muted)}
/* Main / chat */
.main{display:flex;flex-direction:column;min-width:0;height:100vh}
.top{display:flex;align-items:center;gap:12px;padding:18px 26px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.8);backdrop-filter:blur(8px)}
.top .av{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#3730a3);display:grid;place-items:center;color:#fff;font-size:20px}
.top h1{font-size:17px;font-weight:800;letter-spacing:-.01em}
.top .sub{font-size:12.5px;color:var(--muted)}
.top .live{margin-left:auto;color:var(--green);font-weight:700;font-size:12px;letter-spacing:.06em;display:flex;align-items:center;gap:7px}
#chatlog{flex:1;overflow-y:auto;padding:26px;display:flex;flex-direction:column;gap:14px;background:#fafbfe}
.msg{max-width:78%;padding:13px 16px;border-radius:16px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.ai{background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px;align-self:flex-start}
.msg.me{background:linear-gradient(90deg,#312e81,#6366f1);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.role{font-size:11px;color:var(--muted);font-weight:600;margin:0 6px}
.wrap{display:flex;flex-direction:column;gap:4px;max-width:100%}
.wrap.me{align-items:flex-end}.wrap.ai{align-items:flex-start}
.msg.typing{display:inline-flex;gap:5px;align-items:center}
.msg.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;animation:blink 1.4s infinite both}
.msg.typing span:nth-child(2){animation-delay:.2s}.msg.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}
.composer{display:flex;gap:10px;padding:16px 26px;border-top:1px solid var(--line);background:#fff}
.composer textarea{flex:1;resize:none;height:46px;max-height:140px;border:1px solid #dfe2ef;border-radius:12px;padding:12px 15px;font:inherit;font-size:14.5px;outline:0}
.composer textarea:focus{border-color:var(--indigo2)}
.composer button{background:var(--indigo);color:#fff;border:0;border-radius:12px;padding:0 22px;font:inherit;font-weight:700;font-size:14px;cursor:pointer}
.composer button:disabled{opacity:.5;cursor:default}
@media(max-width:820px){.app{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div>
      <div class="brand">JobFlow AI</div>
      <div class="status"><span class="dot"></span> AI Co-pilot Active</div>
    </div>

    <div>
      <div class="section-label">Quick Actions</div>
      <div class="actions" id="actions">
        <button class="qa primary" data-msg="Let's start a Q&amp;A session so you can learn more about me."><span class="ico">🎤</span> Start Q&amp;A session</button>
        <button class="qa" data-needmaterial="1" data-msg="I want to add more information to my profile."><span class="ico">📎</span> Add info</button>
        <button class="qa" data-needmaterial="1" data-marks-list="1" data-msg="Please generate my ranked list of suitable jobs."><span class="ico">📋</span> Generate job list</button>
        <button class="qa" data-needmaterial="1" data-msg="Please generate a general resume and cover letter for me, without tailoring to a specific job."><span class="ico">📄</span> Generate resume / cover letter</button>
        <button class="qa" data-needlist="1" data-msg="I'd like to tailor a resume and cover letter for a job from the list."><span class="ico">✍️</span> Tailor for a job</button>
        <button class="qa" data-needresume="1" data-msg="I'd like to apply to a job on LinkedIn using Easy Apply, using the resume that was just generated. Ask me which job from my list, fill in the application, then show me a summary of the exact answers you'll submit and WAIT for me to reply 'yes' here in this chat before you submit. Do NOT rely on a separate approval dialog or any auto-approve mechanism — get my confirmation as a normal chat reply first."><span class="ico">🚀</span> Apply to a job</button>
      </div>
    </div>

    <div>
      <div class="section-label">Materials</div>
      <div class="drop" id="drop">
        <div class="cloud">☁️</div>
        <h4>Upload materials</h4>
        <p>Resume, transcript or syllabus. Drag &amp; drop or pick files.</p>
        <div class="btnrow">
          <button class="btn btn-dark" id="selectBtn" type="button">Select Files</button>
          <button class="btn btn-soft" id="driveBtn" type="button">Connect Drive</button>
        </div>
        <input type="file" id="file" multiple style="display:none"/>
      </div>
      <div class="status-line" id="uploadStatus"></div>
    </div>

    <div>
      <div class="section-label">Generated Files</div>
      <div class="files" id="files"></div>
      <div class="files-empty" id="files-empty">No generated files yet — they'll appear here when Sai creates them.</div>
    </div>
  </aside>

  <div class="main">
    <header class="top">
      <div class="av">🤖</div>
      <div>
        <h1>Q&amp;A</h1>
        <div class="sub">Relayed to your Sai agent over Telegram</div>
      </div>
      <div class="live"><span class="dot"></span> LIVE</div>
    </header>
    <div id="chatlog"></div>
    <div class="composer">
      <textarea id="text" placeholder="Answer the questions or type a message…  (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="sendBtn" type="button">Send</button>
    </div>
  </div>
</div>

<script>
let lastId = 0;
let intakeReady = false, listReady = false, resumeReady = false;
const chatlog = document.getElementById('chatlog');
const text = document.getElementById('text');
const sendBtn = document.getElementById('sendBtn');
const fileInput = document.getElementById('file');
const uploadStatus = document.getElementById('uploadStatus');
const STAGE_RE = /STAGE:\s*(INTAKE|GRILL|LIST|TAILOR|APPLY)/i;
const MATERIAL_RE = /MATERIAL:\s*(ready|yes|1|true)/i;

function gate(){
  document.querySelectorAll('#actions .qa').forEach(b=>{
    if(b.dataset.needresume==='1'){ b.style.display = resumeReady?'':'none'; return; }
    if(b.dataset.needlist==='1'){ b.style.display = listReady?'':'none'; return; }
    const gated = b.dataset.needmaterial==='1';
    b.style.display = (!gated||intakeReady)?'':'none';
  });
}

function addMsg(msg){
  const wrap=document.createElement('div');
  wrap.className='wrap '+(msg.role==='you'?'me':'ai');
  const r=document.createElement('div'); r.className='role'; r.textContent=msg.role==='you'?'You':'Sai';
  wrap.appendChild(r);
  if(msg.text){
    let t=msg.text;
    const sm=t.match(STAGE_RE);
    if(sm && /^(LIST|TAILOR|APPLY)$/i.test(sm[1])){ listReady=true; gate(); }
    t=t.replace(STAGE_RE,'').replace(/^[\s\n]+/,'').trim();
    const mm=t.match(MATERIAL_RE);
    if(mm){ intakeReady=true; gate(); t=t.replace(MATERIAL_RE,'').replace(/^[\s\n]+/,'').trim(); }
    if(t){ const m=document.createElement('div'); m.className='msg '+(msg.role==='you'?'me':'ai'); m.textContent=t; wrap.appendChild(m); }
  }
  if(msg.file){
    const a=document.createElement('a'); a.className='filechip';
    a.href='/api/download/'+encodeURIComponent(msg.file); a.download=msg.file;
    a.textContent='⬇️ '+msg.file; wrap.appendChild(a);
    if(!resumeReady && /resume/i.test(msg.file)){ resumeReady=true; gate(); }
  }
  chatlog.appendChild(wrap); chatlog.scrollTop=chatlog.scrollHeight;
}

let typingEl=null;
function showTyping(){
  if(typingEl) return;
  typingEl=document.createElement('div'); typingEl.className='wrap ai';
  const r=document.createElement('div'); r.className='role'; r.textContent='Sai';
  const b=document.createElement('div'); b.className='msg ai typing';
  b.innerHTML='<span></span><span></span><span></span>';
  typingEl.appendChild(r); typingEl.appendChild(b);
  chatlog.appendChild(typingEl); chatlog.scrollTop=chatlog.scrollHeight;
}
function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } }

async function poll(){
  try{
    const res=await fetch('/api/messages?after='+lastId);
    const data=await res.json();
    for(const msg of data.messages){ if(msg.role==='sai') hideTyping(); addMsg(msg); lastId=Math.max(lastId,msg.id); }
  }catch(e){}
}
setInterval(poll,1500); poll();

async function send(){
  const t=text.value.trim(); if(!t) return;
  sendBtn.disabled=true;
  try{
    const res=await fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});
    if(res.ok){ text.value=''; intakeReady=true; gate(); await poll(); showTyping(); }
    else { const e=await res.json(); alert('Send failed: '+(e.error||res.status)); }
  } finally { sendBtn.disabled=false; text.focus(); }
}
sendBtn.onclick=send;
text.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });

// quick actions
document.querySelectorAll('#actions .qa').forEach(btn=>{
  btn.onclick=()=>{ if(btn.dataset.marksList==='1'){ listReady=true; gate(); } text.value=btn.dataset.msg; send(); };
});
gate();

// upload
async function uploadFiles(files){
  if(!files.length) return;
  for(const f of files){
    uploadStatus.textContent='Uploading '+f.name+'…';
    const fd=new FormData(); fd.append('file',f);
    try{
      const res=await fetch('/api/upload',{method:'POST',body:fd});
      if(!res.ok){ const e=await res.json(); uploadStatus.textContent='Failed: '+(e.error||res.status); }
      else { intakeReady=true; if(/resume/i.test(f.name)) resumeReady=true; gate(); poll(); }
    }catch(e){ uploadStatus.textContent='Error: '+e.message; }
  }
  uploadStatus.textContent='Done.'; fileInput.value='';
}
document.getElementById('selectBtn').onclick=()=>fileInput.click();
fileInput.onchange=()=>uploadFiles(fileInput.files);
document.getElementById('driveBtn').onclick=()=>alert('Google Drive connection coming soon.');
const drop=document.getElementById('drop');
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{ e.preventDefault(); drop.classList.add('drag'); }));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{ e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop',e=>{ if(e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); });

// generated files
const filesDiv=document.getElementById('files');
async function pollFiles(){
  try{
    const res=await fetch('/api/files'); const data=await res.json();
    const empty=document.getElementById('files-empty');
    filesDiv.innerHTML='';
    if(data.files && data.files.length){
      if(empty) empty.style.display='none';
      for(const name of data.files){
        const a=document.createElement('a'); a.className='filechip';
        a.href='/api/download/'+encodeURIComponent(name); a.download=name;
        a.textContent='⬇️ '+name; filesDiv.appendChild(a);
      }
      if(!resumeReady && data.files.some(n=>/resume/i.test(n))){ resumeReady=true; gate(); }
    } else if(empty){ empty.style.display=''; }
  }catch(e){}
}
setInterval(pollFiles,3000); pollFiles();
</script>
</body>
</html>
